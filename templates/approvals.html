<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GigForge — Approvals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        h1 { color: #f1f5f9; margin-bottom: 20px; }
        .card { background: #1e293b; border-radius: 8px; padding: 16px; border: 1px solid #334155; margin-bottom: 12px; }
        .card h3 { color: #f8fafc; margin-bottom: 4px; }
        .meta { color: #94a3b8; font-size: 13px; margin-bottom: 12px; }
        .price { color: #4ade80; font-weight: 700; font-size: 18px; }
        .btn { border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; margin-right: 8px; }
        .btn-approve { background: #15803d; color: white; }
        .btn-approve:hover { background: #16a34a; }
        .btn-reject { background: #b91c1c; color: white; }
        .btn-reject:hover { background: #dc2626; }
        .empty { color: #64748b; text-align: center; padding: 40px; }
        a { color: #60a5fa; text-decoration: none; }
        .nav { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="nav"><a href="/">&larr; Dashboard</a></div>
    <h1>Pending Approvals</h1>
    <div id="list"><div class="empty">Loading...</div></div>
    <script>
    async function load() {
        const res = await (await fetch('/api/approvals')).json();
        const list = document.getElementById('list');
        if (!res.approvals.length) {
            list.innerHTML = '<div class="empty">No pending approvals</div>';
            return;
        }
        list.innerHTML = res.approvals.map(p => `
            <div class="card" id="card-${p.id}">
                <h3>${p.project_title || 'Untitled'}</h3>
                <div class="meta">${p.customer_email || ''} &middot; ${(p.created_at || '').slice(0,10)}</div>
                <div class="price">EUR ${(p.price_eur || 0).toFixed(0)}</div>
                <div style="margin-top:12px">
                    <button class="btn btn-approve" onclick="act(${p.id},'approve')">Approve</button>
                    <button class="btn btn-reject" onclick="act(${p.id},'reject')">Reject</button>
                </div>
            </div>
        `).join('');
    }
    async function act(id, type) {
        await fetch('/api/approvals/' + id + '/' + type, {method: 'POST'});
        document.getElementById('card-' + id).style.opacity = '0.3';
        setTimeout(load, 2000);
    }
    load();
    setInterval(load, 30000);
    </script>
</body>
</html>
